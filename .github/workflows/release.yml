name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        npm install -g web-ext
        sudo apt-get update
        sudo apt-get install -y zip
    
    - name: Generate icons
      run: |
        python3 create_icons.py
        sudo apt-get install -y imagemagick
        cd icons
        for size in 16 32 48 128; do
          convert icon-${size}.svg icon-${size}.png
        done
        cd ..
    
    - name: Build Chrome extension
      run: |
        mkdir -p dist/chrome
        cp manifest.json dist/chrome/
        cp popup.html dist/chrome/
        cp popup.css dist/chrome/
        cp popup.js dist/chrome/
        cp content.js dist/chrome/
        cp -r icons dist/chrome/
        cd dist/chrome
        zip -r ../scorm-completion-helper-chrome.zip .
        cd ../..
    
    - name: Build Firefox extension (Manifest V2)
      run: |
        mkdir -p dist/firefox
        # Create Firefox-specific manifest
        cat > dist/firefox/manifest.json << 'EOF'
        {
          "manifest_version": 2,
          "name": "SCORM Completion Helper",
          "version": "1.0.0",
          "description": "Inject SCORM API calls to mark courses as completed",
          "permissions": [
            "activeTab",
            "<all_urls>"
          ],
          "browser_action": {
            "default_popup": "popup.html",
            "default_title": "SCORM Completion Helper"
          },
          "icons": {
            "16": "icons/icon-16.png",
            "32": "icons/icon-32.png",
            "48": "icons/icon-48.png",
            "128": "icons/icon-128.png"
          },
          "content_scripts": [
            {
              "matches": ["<all_urls>"],
              "js": ["content.js"],
              "run_at": "document_end"
            }
          ],
          "web_accessible_resources": ["injected.js"]
        }
        EOF
        
        cp popup.html dist/firefox/
        cp popup.css dist/firefox/
        cp popup.js dist/firefox/
        cp content.js dist/firefox/
        cp -r icons dist/firefox/
        
        # Create Firefox-specific popup.js (replace chrome.scripting with chrome.tabs)
        sed 's/chrome\.scripting\.executeScript/chrome.tabs.executeScript/g' popup.js > dist/firefox/popup.js
        
        cd dist/firefox
        zip -r ../scorm-completion-helper-firefox.zip .
        cd ../..
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/scorm-completion-helper-chrome.zip
          dist/scorm-completion-helper-firefox.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload Chrome Extension to Web Store
      if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
      uses: mnao305/chrome-extension-upload@v4.0.1
      with:
        file-path: dist/scorm-completion-helper-chrome.zip
        extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
        client-id: ${{ secrets.CHROME_CLIENT_ID }}
        client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
        refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
        publish: true
    
    - name: Upload Firefox Add-on
      if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
      uses: trmcnvn/firefox-addon@v1
      with:
        uuid: ${{ secrets.FIREFOX_ADDON_UUID }}
        xpi: dist/scorm-completion-helper-firefox.zip
        manifest: dist/firefox/manifest.json
        api-key: ${{ secrets.FIREFOX_API_KEY }}
        api-secret: ${{ secrets.FIREFOX_API_SECRET }}

  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install web-ext
      run: npm install -g web-ext
    
    - name: Generate icons
      run: |
        python3 create_icons.py
        sudo apt-get update
        sudo apt-get install -y imagemagick
        cd icons
        for size in 16 32 48 128; do
          convert icon-${size}.svg icon-${size}.png
        done
        cd ..
    
    - name: Lint Chrome extension
      run: |
        mkdir -p dist/chrome
        cp manifest.json dist/chrome/
        cp popup.html dist/chrome/
        cp popup.css dist/chrome/
        cp popup.js dist/chrome/
        cp content.js dist/chrome/
        cp -r icons dist/chrome/
        cd dist/chrome
        web-ext lint --source-dir . --warnings-as-errors
        cd ../..
    
    - name: Lint Firefox extension
      run: |
        mkdir -p dist/firefox
        # Create Firefox-specific manifest
        cat > dist/firefox/manifest.json << 'EOF'
        {
          "manifest_version": 2,
          "name": "SCORM Completion Helper",
          "version": "1.0.0",
          "description": "Inject SCORM API calls to mark courses as completed",
          "permissions": [
            "activeTab",
            "<all_urls>"
          ],
          "browser_action": {
            "default_popup": "popup.html",
            "default_title": "SCORM Completion Helper"
          },
          "icons": {
            "16": "icons/icon-16.png",
            "32": "icons/icon-32.png",
            "48": "icons/icon-48.png",
            "128": "icons/icon-128.png"
          },
          "content_scripts": [
            {
              "matches": ["<all_urls>"],
              "js": ["content.js"],
              "run_at": "document_end"
            }
          ],
          "web_accessible_resources": ["injected.js"]
        }
        EOF
        
        cp popup.html dist/firefox/
        cp popup.css dist/firefox/
        cp popup.js dist/firefox/
        cp content.js dist/firefox/
        cp -r icons dist/firefox/
        
        cd dist/firefox
        web-ext lint --source-dir . --warnings-as-errors
        cd ../..