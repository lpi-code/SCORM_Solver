<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCORM Completion Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">🎓</div>
      <h1>SCORM Helper</h1>
    </div>
    
    <div class="status-card">
      <div class="status-indicator" id="statusIndicator">
        <div class="spinner"></div>
      </div>
      <div class="status-text">
        <span id="statusText">Checking SCORM API...</span>
      </div>
    </div>

    <div class="action-section">
      <button id="completeButton" class="complete-button" disabled>
        <span class="button-icon">✓</span>
        <span class="button-text">Mark as Completed</span>
      </button>
      
      <div class="info-text">
        This will set your course progress to 100% completed with a passing score.
      </div>
    </div>

    <div class="footer">
      <div class="version">v1.0.0</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
